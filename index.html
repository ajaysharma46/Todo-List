<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-base">
    <div class="container">    

        <div class="stats-container">

            <div class="details">    

                <h1>Todo App</h1>
                <p>Keep it up</p>

                <div id="progressBar">  

                    <div id="progress"></div>   
                </div>
            </div>

            <div class="stats-numbers">

                <p id="numbers">0/0</p>     
            </div> 

        </div>
        <form action="">        
            <input type="text" id="taskInput" placeholder="Write your task">
            <button id="newTask" type="submit">+</button>
        </form>
        
        <ul id="task-list"></ul>
        </div>
        </div>
    <script src="script.js"></script>
   
    <script  import JSConfetti from 'js-confetti'; src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js" ></script>

       



</body>
</html>
